# Запуск усієї системи однією командою:  docker compose up --build
# Після старту: фронтенд — http://localhost:8080 , API — http://localhost:4000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studorg_docflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studorg_docflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/studorg_docflow
      # Задайте власний секрет у .env поряд із цим файлом (JWT_SECRET=...).
      # Якщо не задано — сервер згенерує тимчасовий і попередить у логах.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:8080
      # SMTP для реальної відправки email (значення з файлу .env)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@studorg-docflow.local}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    # Ініціалізація схеми + демо-дані, потім запуск сервера.
    # SEED_ON_START=false вимкне перезавантаження демо-даних.
    command: >
      sh -c "node src/db/init.js &&
             node src/db/seed.js &&
             node src/index.js"

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
